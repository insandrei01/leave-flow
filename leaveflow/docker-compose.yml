version: "3.9"

services:
  mongodb:
    image: mongo:8
    container_name: leaveflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: leaveflow

  redis:
    image: redis:7-alpine
    container_name: leaveflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
