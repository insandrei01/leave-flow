<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeaveFlow — Design Variants Navigator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .toolbar .logo {
      font-weight: 700;
      font-size: 16px;
      color: #818cf8;
      margin-right: 8px;
      white-space: nowrap;
    }

    .toolbar .separator {
      width: 1px;
      height: 24px;
      background: #334155;
    }

    /* Variant selector */
    .variant-tabs {
      display: flex;
      gap: 4px;
    }

    .variant-tab {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
      background: transparent;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .variant-tab:hover {
      background: #334155;
      color: #e2e8f0;
    }

    .variant-tab.active {
      border-color: #818cf8;
      background: rgba(129, 140, 248, 0.1);
      color: #818cf8;
    }

    .variant-tab .tag {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 6px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .variant-tab.conservative .tag { background: #065f46; color: #6ee7b7; }
    .variant-tab.creative .tag { background: #3730a3; color: #a5b4fc; }
    .variant-tab.experimental .tag { background: #7c2d12; color: #fdba74; }

    /* Page selector */
    .page-tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .page-tab {
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .page-tab:hover {
      background: #334155;
      color: #e2e8f0;
    }

    .page-tab.active {
      background: #334155;
      color: #f8fafc;
    }

    /* View mode */
    .view-modes {
      display: flex;
      gap: 2px;
      background: #0f172a;
      border-radius: 6px;
      padding: 2px;
    }

    .view-mode {
      padding: 5px 10px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .view-mode:hover { color: #e2e8f0; }
    .view-mode.active { background: #334155; color: #f8fafc; }

    /* Content area */
    .content {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* Single view */
    .content.single iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Split view - 2 side by side */
    .content.split {
      gap: 2px;
    }

    .content.split .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .panel-header {
      padding: 6px 12px;
      background: #1e293b;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .panel-header .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .panel-header .dot.conservative { background: #34d399; }
    .panel-header .dot.creative { background: #818cf8; }
    .panel-header .dot.experimental { background: #fb923c; }

    .panel iframe {
      flex: 1;
      border: none;
      width: 100%;
    }

    /* Triple view */
    .content.triple {
      gap: 2px;
    }

    .content.triple .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Info bar at bottom */
    .info-bar {
      padding: 6px 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #64748b;
      flex-shrink: 0;
    }

    .info-bar .keys {
      display: flex;
      gap: 16px;
    }

    .info-bar kbd {
      background: #334155;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      color: #94a3b8;
    }

    /* Hidden panels */
    .panel.hidden { display: none; }

    @media (max-width: 900px) {
      .page-tabs { display: none; }
      .toolbar { gap: 8px; }
    }
  </style>
</head>
<body>

<div class="toolbar">
  <span class="logo">LeaveFlow</span>
  <span class="separator"></span>

  <div class="variant-tabs">
    <button class="variant-tab conservative active" onclick="setVariant('conservative')">
      Conservative<span class="tag">Safe</span>
    </button>
    <button class="variant-tab creative" onclick="setVariant('creative')">
      Creative<span class="tag">Balanced</span>
    </button>
    <button class="variant-tab experimental" onclick="setVariant('experimental')">
      Experimental<span class="tag">Bold</span>
    </button>
  </div>

  <div class="page-tabs">
    <button class="page-tab active" onclick="setPage('dashboard-home')">Dashboard</button>
    <button class="page-tab" onclick="setPage('absence-calendar')">Calendar</button>
    <button class="page-tab" onclick="setPage('workflow-builder')">Workflow</button>
    <button class="page-tab" onclick="setPage('leave-request-detail')">Request Detail</button>
    <button class="page-tab" onclick="setPage('onboarding-wizard')">Onboarding</button>
    <button class="page-tab" onclick="setPage('employee-self-service')">Self-Service</button>
  </div>

  <div class="view-modes">
    <button class="view-mode active" onclick="setViewMode('single')" title="Single variant">1</button>
    <button class="view-mode" onclick="setViewMode('split')" title="Compare 2 variants">2</button>
    <button class="view-mode" onclick="setViewMode('triple')" title="Compare all 3">3</button>
  </div>
</div>

<div class="content single" id="content">
  <!-- Panels injected by JS -->
</div>

<div class="info-bar">
  <div class="keys">
    <span><kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> View mode</span>
    <span><kbd>C</kbd> Conservative</span>
    <span><kbd>R</kbd> Creative</span>
    <span><kbd>E</kbd> Experimental</span>
    <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> Switch page</span>
  </div>
  <span id="current-info">Conservative / Dashboard</span>
</div>

<script>
  const variants = ['conservative', 'creative', 'experimental'];
  const pages = [
    'dashboard-home',
    'absence-calendar',
    'workflow-builder',
    'leave-request-detail',
    'onboarding-wizard',
    'employee-self-service'
  ];
  const pageLabels = {
    'dashboard-home': 'Dashboard',
    'absence-calendar': 'Calendar',
    'workflow-builder': 'Workflow',
    'leave-request-detail': 'Request Detail',
    'onboarding-wizard': 'Onboarding',
    'employee-self-service': 'Self-Service'
  };

  let currentVariant = 'conservative';
  let currentPage = 'dashboard-home';
  let currentViewMode = 'single';

  function getUrl(variant, page) {
    return `./${variant}/${page}.html`;
  }

  function setVariant(v) {
    currentVariant = v;
    document.querySelectorAll('.variant-tab').forEach(el => {
      el.classList.toggle('active', el.classList.contains(v));
    });
    render();
  }

  function setPage(p) {
    currentPage = p;
    document.querySelectorAll('.page-tab').forEach((el, i) => {
      el.classList.toggle('active', pages[i] === p);
    });
    render();
  }

  function setViewMode(mode) {
    currentViewMode = mode;
    document.querySelectorAll('.view-mode').forEach((el, i) => {
      const modes = ['single', 'split', 'triple'];
      el.classList.toggle('active', modes[i] === mode);
    });
    render();
  }

  function createPanel(variant) {
    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = `
      <div class="panel-header">
        <span class="dot ${variant}"></span>
        ${variant.charAt(0).toUpperCase() + variant.slice(1)}
      </div>
      <iframe src="${getUrl(variant, currentPage)}" loading="lazy"></iframe>
    `;
    return panel;
  }

  function render() {
    const content = document.getElementById('content');
    content.innerHTML = '';

    if (currentViewMode === 'single') {
      content.className = 'content single';
      const iframe = document.createElement('iframe');
      iframe.src = getUrl(currentVariant, currentPage);
      content.appendChild(iframe);
    } else if (currentViewMode === 'split') {
      content.className = 'content split';
      const secondVariant = variants[(variants.indexOf(currentVariant) + 1) % 3];
      content.appendChild(createPanel(currentVariant));
      content.appendChild(createPanel(secondVariant));
    } else {
      content.className = 'content triple';
      variants.forEach(v => content.appendChild(createPanel(v)));
    }

    document.getElementById('current-info').textContent =
      `${currentVariant.charAt(0).toUpperCase() + currentVariant.slice(1)} / ${pageLabels[currentPage]}`;
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    switch(e.key) {
      case '1': setViewMode('single'); break;
      case '2': setViewMode('split'); break;
      case '3': setViewMode('triple'); break;
      case 'c': case 'C': setVariant('conservative'); break;
      case 'r': case 'R': setVariant('creative'); break;
      case 'e': case 'E': setVariant('experimental'); break;
      case 'ArrowRight':
        e.preventDefault();
        setPage(pages[(pages.indexOf(currentPage) + 1) % pages.length]);
        break;
      case 'ArrowLeft':
        e.preventDefault();
        setPage(pages[(pages.indexOf(currentPage) - 1 + pages.length) % pages.length]);
        break;
    }
  });

  // Initial render
  render();
</script>

</body>
</html>
